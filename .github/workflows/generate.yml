name: Generate Article

on:
  schedule:
    # 2x sehari: 15:00 WIB (08:00 UTC) & 18:00 WIB (11:00 UTC)
    - cron: '0 8,11 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger article generation
        run: |
          curl -s -X POST "${{ secrets.API_ENDPOINT }}/api/generate" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -d '{}'
