# .github/workflows/generate-articles.yml
# GitHub Actions Workflow - Retro AI Blog
# Trigger: 2x per day (08:00 & 20:00 WIB)

name: Generate Daily Articles

on:
  schedule:
    # 08:00 WIB = 01:00 UTC
    - cron: '0 1 * * *'
    # 20:00 WIB = 13:00 UTC
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      topic:
        description: 'Article topic (optional)'
        required: false
        default: ''
      category:
        description: 'Article category'
        required: false
        default: 'ai'
        type: choice
        options:
          - ai
          - marketing
          - freelance
          - coding
          - crypto

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Article #1
        run: |
          TOPIC="${{ github.event.inputs.topic || 'Cara Menggunakan AI untuk Produktivitas' }}"
          CATEGORY="${{ github.event.inputs.category || 'ai' }}"

          curl -X POST https://yourname.my.id/api/generate             -H "Content-Type: application/json"             -d "{"topic":"$TOPIC","keywords":["ai","produktivitas","automation"],"category":"$CATEGORY"}"             --max-time 120             --retry 2             --retry-delay 5

      - name: Wait 30 seconds
        run: sleep 30

      - name: Generate Article #2
        run: |
          TOPIC="${{ github.event.inputs.topic || 'Trend Teknologi AI Terbaru 2026' }}"
          CATEGORY="${{ github.event.inputs.category || 'ai' }}"

          curl -X POST https://yourname.my.id/api/generate             -H "Content-Type: application/json"             -d "{"topic":"$TOPIC","keywords":["ai","trend","teknologi","2026"],"category":"$CATEGORY"}"             --max-time 120             --retry 2             --retry-delay 5

      - name: Log completion
        run: echo "Articles generated at $(date)"
